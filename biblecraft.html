<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Covenant Craft | Instant Play Edition</title>
    
    <style>
        /* --- VISUAL STYLES --- */
        :root { --primary: #FFD700; --bg-dark: rgba(0, 0, 0, 0.85); }
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        #stats { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bar-container { width: 200px; height: 18px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 4px; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .bar { height: 100%; width: 100%; background: #ff4444; transition: width 0.3s; }
        .bar-container span { position: absolute; top: -20px; color: white; font-size: 14px; font-weight: 800; text-shadow: 1px 1px 2px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.8); font-size: 28px; font-weight: bold; text-shadow: 1px 1px 0 #000; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: auto; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; }
        .slot { width: 56px; height: 56px; background: rgba(0,0,0,0.8); border: 3px solid #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; transition: 0.2s; padding: 0; color: white; }
        .slot:hover { transform: translateY(-5px); background: #333; }
        .slot.active { border-color: var(--primary); transform: scale(1.15) translateY(-5px); box-shadow: 0 0 15px var(--primary); }
        
        .overlay { position: fixed; inset: 0; background: var(--bg-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; backdrop-filter: blur(5px); }
        .hidden { display: none !important; }
        h1 { font-size: clamp(40px, 5vw, 80px); margin: 0 0 30px 0; color: var(--primary); text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); letter-spacing: 2px; }
        
        .primary-btn { padding: 18px 50px; font-size: 22px; cursor: pointer; background: var(--primary); color: #000; border: none; font-weight: 900; letter-spacing: 1px; margin-bottom: 20px; box-shadow: 0 6px 0 #B8860B; border-radius: 6px; transition: 0.2s; }
        .primary-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 8px 0 #aaa; }
        .primary-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #aaa; }
        
        .save-controls { display: flex; gap: 15px; margin-top: 20px; }
        .save-controls button { font-size: 16px; padding: 12px 24px; background: #444; color: white; border: 2px solid #666; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .save-controls button:hover { background: #666; border-color: #888; }
        
        .lang-selector { margin-bottom: 30px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        .lang-selector select { font-size: 16px; padding: 8px; background: #222; color: white; border: 1px solid var(--primary); border-radius: 4px; outline: none; }
        #save-msg { color: #44ff44; font-size: 20px; font-weight: bold; margin-top: 15px; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <main id="ui">
        <div id="stats">
            <div class="bar-container">
                <div id="hp-bar" class="bar"></div>
                <span id="hp-text">HP</span>
            </div>
        </div>
        <div id="crosshair">+</div>
        <div id="inventory">
            <button class="slot active" data-type="stone">🪨</button>
            <button class="slot" data-type="wood">🪵</button>
            <button class="slot" data-type="leaves">🌿</button>
            <button class="slot" data-type="gold">🪙</button>
        </div>
    </main>

    <div id="menu" class="overlay">
        <h1 id="title-text">COVENANT CRAFT</h1>
        
        <div class="lang-selector">
            <label id="lang-label" for="lang-select">Language:</label>
            <select id="lang-select">
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
            </select>
        </div>

        <button id="start-btn" class="primary-btn">BEGIN JOURNEY</button>
        
        <div class="save-controls">
            <button id="save-btn">SAVE WORLD</button>
            <button id="load-btn">LOAD WORLD</button>
        </div>
        <p id="save-msg" class="hidden">World Saved!</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. WORLD SETUP & GRAPHICS
        const scene = new THREE.Scene();
        const worldMap = new Map();
        const particles = [];

        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const particleGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);

        const mats = {
            grass: new THREE.MeshLambertMaterial({ color: 0x4ade80 }),
            dirt: new THREE.MeshLambertMaterial({ color: 0x854d0e }),
            stone: new THREE.MeshLambertMaterial({ color: 0x94a3b8 }),
            wood: new THREE.MeshLambertMaterial({ color: 0x78350f }),
            leaves: new THREE.MeshLambertMaterial({ color: 0x166534 }),
            gold: new THREE.MeshStandardMaterial({ color: 0xfacc15, metalness: 0.8, roughness: 0.2 }),
            water: new THREE.MeshLambertMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.7 })
        };

        function getGridKey(x, y, z) { return `${Math.round(x)},${Math.round(y)},${Math.round(z)}`; }

        function addBlock(x, y, z, type) {
            const key = getGridKey(x, y, z);
            if (worldMap.has(key)) return;
            const mesh = new THREE.Mesh(boxGeo, mats[type]);
            mesh.position.set(Math.round(x), Math.round(y), Math.round(z));
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
            worldMap.set(key, { mesh, type });
        }

        function removeBlock(x, y, z) {
            const key = getGridKey(x, y, z);
            const data = worldMap.get(key);
            if (data && data.type !== 'water') {
                scene.remove(data.mesh);
                worldMap.delete(key);
                spawnParticles(x, y, z, mats[data.type].color);
                return true;
            }
            return false;
        }

        function clearWorld() {
            worldMap.forEach(data => scene.remove(data.mesh));
            worldMap.clear();
        }

        function generateWorld() {
            clearWorld();
            const size = 20;
            for(let x = -size; x < size; x++) {
                for(let z = -size; z < size; z++) {
                    const height = Math.floor(Math.sin(x/5) * Math.cos(z/5) * 4);
                    if (height >= -1) addBlock(x, height, z, 'grass');
                    if (height < -1) addBlock(x, -1, z, 'water');
                    
                    addBlock(x, height-1, z, 'dirt');
                    addBlock(x, height-2, z, 'dirt');
                    for(let y = height-3; y > -10; y--) {
                        addBlock(x, y, z, (Math.random() > 0.98 && y < -5) ? 'gold' : 'stone');
                    }

                    if (height >= -1 && Math.random() > 0.95) {
                        const h = height + 1;
                        addBlock(x, h, z, 'wood'); addBlock(x, h+1, z, 'wood'); addBlock(x, h+2, z, 'wood');
                        addBlock(x, h+3, z, 'leaves'); addBlock(x+1, h+2, z, 'leaves'); addBlock(x-1, h+2, z, 'leaves');
                        addBlock(x, h+2, z+1, 'leaves'); addBlock(x, h+2, z-1, 'leaves');
                    }
                }
            }
        }

        function spawnParticles(x, y, z, color) {
            const mat = new THREE.MeshBasicMaterial({ color: color });
            for(let i=0; i<6; i++) {
                const p = new THREE.Mesh(particleGeo, mat);
                p.position.set(x + (Math.random()-0.5), y + (Math.random()-0.5), z + (Math.random()-0.5));
                p.userData = { velocity: new THREE.Vector3((Math.random()-0.5)*5, Math.random()*5, (Math.random()-0.5)*5), life: 1.0 };
                scene.add(p); particles.push(p);
            }
        }

        function updateParticles(delta) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.userData.life -= delta * 2;
                p.userData.velocity.y -= 15 * delta;
                p.position.addScaledVector(p.userData.velocity, delta);
                p.scale.setScalar(p.userData.life);
                if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            }
        }

        // 2. AUDIO & UI LOGIC
        const dict = {
            en: { title: "COVENANT CRAFT", start: "BEGIN JOURNEY", hp: "HP", language: "Language:", save: "SAVE WORLD", load: "LOAD WORLD", saved_msg: "World Saved!" },
            es: { title: "ARTE DEL PACTO", start: "COMENZAR", hp: "VIDA", language: "Idioma:", save: "GUARDAR", load: "CARGAR", saved_msg: "¡Guardado!" },
            fr: { title: "ALLIANCE CRAFT", start: "JOUER", hp: "PV", language: "Langue:", save: "SAUVER", load: "CHARGER", saved_msg: "Sauvegardé!" },
            de: { title: "BUNDES HANDWERK", start: "STARTEN", hp: "LEBEN", language: "Sprache:", save: "SPEICHERN", load: "LADEN", saved_msg: "Gespeichert!" }
        };

        function updateLanguage(lang) {
            document.getElementById('title-text').innerText = dict[lang].title;
            if(!controls.isLocked) document.getElementById('start-btn').innerText = dict[lang].start;
            document.getElementById('hp-text').innerText = dict[lang].hp;
            document.getElementById('lang-label').innerText = dict[lang].language;
            document.getElementById('save-btn').innerText = dict[lang].save;
            document.getElementById('load-btn').innerText = dict[lang].load;
            document.getElementById('save-msg').innerText = dict[lang].saved_msg;
        }
        document.getElementById('lang-select').addEventListener('change', (e) => updateLanguage(e.target.value));

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'jump') { osc.type = 'sine'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); } 
            else if (type === 'mine') { osc.type = 'square'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); } 
            else if (type === 'place') { osc.type = 'triangle'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05); osc.start(); osc.stop(audioCtx.currentTime + 0.05); }
        }

        // 3. CAMERA & LIGHTS
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        const raycaster = new THREE.Raycaster();
        const keys = {};
        let selectedBlock = 'stone';

        scene.background = new THREE.Color(0x87ceeb); scene.fog = new THREE.FogExp2(0x87ceeb, 0.02);
        const ambient = new THREE.AmbientLight(0xffffff, 0.4); scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2); sun.position.set(50, 100, 50);
        sun.castShadow = true; sun.shadow.camera.left = -30; sun.shadow.camera.right = 30; sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30; scene.add(sun);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 4. BUTTONS & CONTROLS
        document.getElementById('start-btn').onclick = () => { audioCtx.resume(); controls.lock(); document.getElementById('menu').classList.add('hidden'); };
        controls.addEventListener('unlock', () => { document.getElementById('menu').classList.remove('hidden'); document.getElementById('start-btn').innerText = dict[document.getElementById('lang-select').value].start; });

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        document.querySelectorAll('.slot').forEach((slot, index) => {
            slot.addEventListener('click', (e) => {
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                e.currentTarget.classList.add('active');
                selectedBlock = e.currentTarget.getAttribute('data-type');
                playSound('place');
            });
        });

        window.addEventListener('keydown', (e) => {
            const keyMap = { 'Digit1': 0, 'Digit2': 1, 'Digit3': 2, 'Digit4': 3 };
            if (keyMap[e.code] !== undefined) document.querySelectorAll('.slot')[keyMap[e.code]].click();
        });

        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            raycaster.setFromCamera(new THREE.Vector2(), camera);
            const objects = Array.from(worldMap.values()).map(data => data.mesh);
            const intersects = raycaster.intersectObjects(objects);
            if (intersects.length > 0 && intersects[0].distance < 7) {
                const hit = intersects[0]; const p = hit.object.position;
                if (e.button === 0) { if (removeBlock(p.x, p.y, p.z)) playSound('mine'); } 
                else if (e.button === 2) { const n = hit.face.normal; addBlock(p.x + n.x, p.y + n.y, p.z + n.z, selectedBlock); playSound('place'); }
            }
        });

        document.getElementById('save-btn').onclick = () => {
            const saveData = { pos: { x: camera.position.x, y: camera.position.y, z: camera.position.z }, blocks: Array.from(worldMap.entries()).map(([key, data]) => ({ key, type: data.type })) };
            localStorage.setItem('covenant_save_v4', JSON.stringify(saveData));
            const msg = document.getElementById('save-msg'); msg.classList.remove('hidden'); setTimeout(() => msg.classList.add('hidden'), 2000); playSound('place');
        };

        document.getElementById('load-btn').onclick = () => {
            const dataStr = localStorage.getItem('covenant_save_v4');
            if (!dataStr) return alert("No save found!");
            const data = JSON.parse(dataStr); clearWorld();
            data.blocks.forEach(b => { const coords = b.key.split(','); addBlock(Number(coords[0]), Number(coords[1]), Number(coords[2]), b.type); });
            camera.position.set(data.pos.x, data.pos.y, data.pos.z); playSound('jump'); controls.lock(); document.getElementById('menu').classList.add('hidden');
        };

        // 5. PHYSICS LOOP
        let velocity = new THREE.Vector3(); let canJump = false;

        function checkCollision(x, y, z) {
            const pad = 0.3;
            for(let dx = -pad; dx <= pad; dx += pad*2) {
                for(let dy = -1.5; dy <= 0.2; dy += 0.8) {
                    for(let dz = -pad; dz <= pad; dz += pad*2) {
                        const key = getGridKey(x+dx, y+dy, z+dz);
                        if (worldMap.has(key) && worldMap.get(key).type !== 'water') return true;
                    }
                }
            } return false;
        }

        function updatePhysics(delta) {
            if (!controls.isLocked) return;
            const speed = keys['ShiftLeft'] ? 15 : 10; const step = speed * delta;
            const move = new THREE.Vector3();
            if (keys['KeyW']) move.z += step; if (keys['KeyS']) move.z -= step; if (keys['KeyA']) move.x -= step; if (keys['KeyD']) move.x += step;

            camera.translateX(move.x); if (checkCollision(camera.position.x, camera.position.y, camera.position.z)) camera.translateX(-move.x);
            camera.translateZ(move.z); if (checkCollision(camera.position.x, camera.position.y, camera.position.z)) camera.translateZ(-move.z);

            velocity.y -= 30 * delta; camera.position.y += velocity.y * delta;
            if (checkCollision(camera.position.x, camera.position.y, camera.position.z)) { camera.position.y -= velocity.y * delta; if (velocity.y < 0) canJump = true; velocity.y = 0; } 
            else { canJump = false; }
            
            if (keys['Space'] && canJump) { velocity.y = 10; canJump = false; playSound('jump'); }
            if (camera.position.y < -20) camera.position.set(0, 15, 0);
        }

        // 6. START
        generateWorld(); camera.position.set(0, 15, 0);
        let lastTime = performance.now(); let dayTime = 0;

        function loop() {
            requestAnimationFrame(loop);
            const time = performance.now(); const delta = Math.min((time - lastTime) / 1000, 0.1); lastTime = time;

            dayTime += delta * 0.1; sun.position.x = Math.cos(dayTime) * 100; sun.position.y = Math.sin(dayTime) * 100;
            const sunHeight = Math.max(0, Math.sin(dayTime)); scene.background.setHSL(0.55, 0.8, 0.2 + sunHeight * 0.5); scene.fog.color.copy(scene.background); ambient.intensity = 0.2 + sunHeight * 0.4;

            updatePhysics(delta); updateParticles(delta); renderer.render(scene, camera);
        }
        loop();
    </script>
</body>
</html>
