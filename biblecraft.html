<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Biblecraft</title>
<style>
body { margin:0; overflow:hidden; font-family:sans-serif; }
#ui{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:6px;
}
#inventory{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:10px;
color:white;
display:flex;
gap:10px;
}
#quests{
position:fixed;
right:10px;
top:10px;
width:220px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px;
}
button{cursor:pointer;}
</style>
</head>

<body>

<div id="ui">
<b>Biblecraft</b><br>
WASD move | Mouse look<br>
Left click: mine<br>
Right click: place<br>
E: crafting
</div>

<div id="inventory"></div>

<div id="quests">
<b>Bible Quests</b>
<ul id="questList"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// BASIC ENGINE

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

let light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(50,100,50)
scene.add(light)

scene.add(new THREE.AmbientLight(0xaaaaaa))

// PLAYER

camera.position.y=5

let velocity={x:0,z:0}
let keys={}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

// BLOCK TYPES

const BLOCKS={
grass:{color:0x55aa33},
dirt:{color:0x8b4513},
stone:{color:0x888888},
wood:{color:0x8B5A2B},
altar:{color:0xffffcc}
}

let world=[]

// CREATE BLOCK

function createBlock(x,y,z,type){

let geo=new THREE.BoxGeometry(1,1,1)

let mat=new THREE.MeshLambertMaterial({
color:BLOCKS[type].color
})

let mesh=new THREE.Mesh(geo,mat)

mesh.position.set(x,y,z)

mesh.userData.type=type

scene.add(mesh)

world.push(mesh)

}

// TERRAIN GENERATION

function generateWorld(){

for(let x=-20;x<20;x++){

for(let z=-20;z<20;z++){

let height=Math.floor(
Math.sin(x*0.3)*2+
Math.cos(z*0.3)*2+2
)

for(let y=0;y<height;y++){

let type="dirt"

if(y==height-1) type="grass"

createBlock(x,y,z,type)

}

}

}

}

generateWorld()

// INVENTORY

let inventory={
wood:0,
stone:0,
altar:0
}

function updateInventory(){

let div=document.getElementById("inventory")

div.innerHTML=""

for(let item in inventory){

let el=document.createElement("div")

el.innerText=item+":"+inventory[item]

div.appendChild(el)

}

}

updateInventory()

// MINING

document.addEventListener("mousedown",e=>{

let raycaster=new THREE.Raycaster()

raycaster.setFromCamera(
new THREE.Vector2(0,0),
camera
)

let hits=raycaster.intersectObjects(world)

if(hits.length){

let block=hits[0].object

if(e.button==0){

scene.remove(block)

world.splice(world.indexOf(block),1)

inventory[block.userData.type]++
updateInventory()

}

if(e.button==2){

let p=hits[0].point.clone()

p.add(hits[0].face.normal)

createBlock(
Math.round(p.x),
Math.round(p.y),
Math.round(p.z),
"stone"
)

}

}

})

// CRAFTING

document.addEventListener("keydown",e=>{

if(e.key=="e"){

if(inventory.stone>=4){

inventory.stone-=4
inventory.altar++

alert("Crafted Altar!")

updateInventory()

}

}

})

// WOLF PETS

let wolves=[]

function spawnWolf(x,z){

let geo=new THREE.BoxGeometry(1,1,2)

let mat=new THREE.MeshLambertMaterial({color:0xffffff})

let wolf=new THREE.Mesh(geo,mat)

wolf.position.set(x,3,z)

wolf.userData.tamed=false

scene.add(wolf)

wolves.push(wolf)

}

spawnWolf(5,5)
spawnWolf(-4,-3)

document.addEventListener("click",()=>{

wolves.forEach(w=>{

let dist=camera.position.distanceTo(w.position)

if(dist<3 && !w.userData.tamed){

w.userData.tamed=true
alert("Wolf tamed!")

}

})

})

// QUESTS

let quests=[
{
text:"Collect 10 wood",
done:false,
check:()=>inventory.wood>=10
},
{
text:"Build an altar",
done:false,
check:()=>inventory.altar>=1
}
]

function updateQuests(){

let list=document.getElementById("questList")

list.innerHTML=""

quests.forEach(q=>{

if(!q.done && q.check()){

q.done=true

alert("Quest Complete: "+q.text)

}

let li=document.createElement("li")

li.innerText=(q.done?"✓ ":"")+q.text

list.appendChild(li)

})

}

setInterval(updateQuests,1000)

// MOVEMENT

function updatePlayer(){

if(keys["w"]) camera.position.z-=0.1
if(keys["s"]) camera.position.z+=0.1
if(keys["a"]) camera.position.x-=0.1
if(keys["d"]) camera.position.x+=0.1

}

// GAME LOOP

function animate(){

requestAnimationFrame(animate)

updatePlayer()

renderer.render(scene,camera)

}

animate()

</script>
</body>
</html>
