<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Biblecraft</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
}

#inventory{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:6px;
}

.slot{
width:70px;
height:50px;
background:rgba(0,0,0,0.7);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:12px;
}

canvas{display:block;}
</style>
</head>

<body>

<div id="ui">
<b>Biblecraft</b><br>
WASD Move<br>
Mouse Look<br>
Left Click Mine<br>
Right Click Place
</div>

<div id="inventory"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* =========================
CORE ENGINE
========================= */

const scene = new THREE.Scene()

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

/* =========================
LIGHTING
========================= */

const ambient = new THREE.AmbientLight(0xffffff,.4)
scene.add(ambient)

const sun = new THREE.DirectionalLight(0xffffff,1)
sun.position.set(100,200,100)
scene.add(sun)

/* =========================
TEXTURES
========================= */

const loader = new THREE.TextureLoader()

const textures = {
grass: loader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg"),
dirt: loader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg"),
stone: loader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg"),
wood: loader.load("https://threejs.org/examples/textures/hardwood2_diffuse.jpg")
}

for(let t in textures){
textures[t].wrapS = textures[t].wrapT = THREE.RepeatWrapping
textures[t].repeat.set(.5,.5)
}

/* =========================
WORLD
========================= */

const blocks=[]
const blockSize=1

function height(x,z){
return Math.floor(
Math.sin(x*.2)*3+
Math.cos(z*.2)*3+
6
)
}

function block(x,y,z,type){

const mat=new THREE.MeshLambertMaterial({
map:textures[type]
})

const geo=new THREE.BoxGeometry(1,1,1)

const mesh=new THREE.Mesh(geo,mat)

mesh.position.set(x+.5,y+.5,z+.5)

mesh.userData={type,x,y,z}

scene.add(mesh)

blocks.push(mesh)
}

function generateWorld(){

for(let x=-40;x<40;x++){

for(let z=-40;z<40;z++){

const h=height(x,z)

for(let y=0;y<=h;y++){

let type="stone"

if(y==h) type="grass"
else if(y>h-3) type="dirt"

block(x,y,z,type)

}

}

}

}

generateWorld()

/* =========================
PLAYER
========================= */

const player = new THREE.Object3D()

player.position.set(0,20,0)

scene.add(player)

player.add(camera)

let pitch=0
let yaw=0

document.body.onclick=()=>{
document.body.requestPointerLock()
}

document.addEventListener("mousemove",e=>{

if(document.pointerLockElement){

yaw-=e.movementX*0.002
pitch-=e.movementY*0.002

pitch=Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch))

player.rotation.y=yaw
camera.rotation.x=pitch

}

})

/* =========================
MOVEMENT
========================= */

const keys={}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

let velocityY=0

function move(dt){

const speed=6

const dir=new THREE.Vector3()

if(keys["w"]) dir.z-=1
if(keys["s"]) dir.z+=1
if(keys["a"]) dir.x-=1
if(keys["d"]) dir.x+=1

dir.normalize()

dir.applyAxisAngle(
new THREE.Vector3(0,1,0),
player.rotation.y
)

player.position.x+=dir.x*speed*dt
player.position.z+=dir.z*speed*dt

/* gravity */

velocityY-=20*dt
player.position.y+=velocityY*dt

const ground=height(
Math.floor(player.position.x),
Math.floor(player.position.z)
)+2

if(player.position.y<ground){

player.position.y=ground
velocityY=0

}

}

/* =========================
MINING
========================= */

const raycaster=new THREE.Raycaster()

document.addEventListener("mousedown",e=>{

raycaster.setFromCamera(
new THREE.Vector2(0,0),
camera
)

const hits=raycaster.intersectObjects(blocks)

if(hits.length==0) return

const block=hits[0].object

if(e.button==0){

scene.remove(block)

const i=blocks.indexOf(block)

if(i>-1) blocks.splice(i,1)

}

})

/* =========================
WOLVES
========================= */

const wolves=[]

function spawnWolf(x,z){

const geo=new THREE.BoxGeometry(.8,.8,.8)

const mat=new THREE.MeshStandardMaterial({color:0xaaaaaa})

const wolf=new THREE.Mesh(geo,mat)

wolf.position.set(x,height(x,z)+1,z)

scene.add(wolf)

wolves.push(wolf)

}

spawnWolf(5,5)
spawnWolf(-8,4)
spawnWolf(10,-6)

/* =========================
WOLF AI
========================= */

function updateWolves(dt){

wolves.forEach(w=>{

const d=new THREE.Vector3()

d.subVectors(player.position,w.position)

if(d.length()>2){

d.normalize()

w.position.x+=d.x*dt*2
w.position.z+=d.z*dt*2

}

})

}

/* =========================
DAY NIGHT
========================= */

let time=0

function updateDay(dt){

time+=dt*.05

const sunHeight=Math.sin(time)

sun.position.y=200*sunHeight

sun.intensity=Math.max(.2,sunHeight)

scene.background=new THREE.Color().setHSL(
.6,.6,
sunHeight*.5+.2
)

}

/* =========================
LOOP
========================= */

let last=performance.now()

function animate(){

requestAnimationFrame(animate)

const now=performance.now()

const dt=(now-last)/1000

last=now

move(dt)

updateWolves(dt)

updateDay(dt)

renderer.render(scene,camera)

}

animate()

</script>
</body>
</html>
